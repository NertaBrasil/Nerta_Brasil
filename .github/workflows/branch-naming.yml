name: Validate Branch Name

on:
  pull_request:
    branches:
      - develop
      - main
      - 'release/**'

jobs:
  check-branch-name:
    name: Check branch naming convention
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch: $BRANCH"

          PATTERN="^(feature|fix|hotfix|chore|docs|refactor|test|release)\/[a-z0-9._-]+$"

          if [[ "$BRANCH" =~ $PATTERN ]]; then
            echo "✅ Branch name '$BRANCH' is valid."
          else
            echo "❌ Branch name '$BRANCH' does not follow the naming convention."
            echo ""
            echo "Allowed prefixes: feature/, fix/, hotfix/, chore/, docs/, refactor/, test/, release/"
            echo "Example: feature/login-page, fix/broken-api, hotfix/critical-bug"
            exit 1
          fi
