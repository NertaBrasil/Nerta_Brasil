<!-- @startingPoint section="Site" subtitle="Vitrine completa Nerta (landing, catálogo, produto)" viewport="1200x780" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nerta Brasil — Vitrine</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { background: var(--navy-deep); }
  #app { min-height: 100vh; display: flex; flex-direction: column; }
  .app-main { flex: 1; }
</style>
</head>
<body>
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
      <rect width="100" height="100" fill="#0D1B2E"/>
      <path d="M50 28 C50 28 38 43 38 53 a12 12 0 0 0 24 0 C62 43 50 28 50 28 Z" fill="#1E7FC8"/>
      <rect x="33" y="70" width="34" height="5" rx="2.5" fill="#C9951A"/>
    </svg>
  </template>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>

  <script src="data.js"></script>
  <script src="assets-inline.js"></script>
  <script type="text/babel" src="responsive.js"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="LandingPage.jsx"></script>
  <script type="text/babel" src="CatalogPage.jsx"></script>
  <script type="text/babel" src="ProductPage.jsx"></script>
  <script type="text/babel" src="AboutPage.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      const [page, setPage] = React.useState('home');
      const [slug, setSlug] = React.useState(null);

      const nav = (p) => { setPage(p); window.scrollTo(0, 0); };
      const openProduct = (s) => { setSlug(s); setPage('product'); window.scrollTo(0, 0); };

      React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [page, slug]);

      let view;
      if (page === 'catalog') view = <window.CatalogPage onOpenProduct={openProduct} />;
      else if (page === 'product') view = <window.ProductPage slug={slug} onNav={nav} onOpenProduct={openProduct} />;
      else if (page === 'about') view = <window.AboutPage onNav={nav} />;
      else view = <window.LandingPage onNav={nav} onOpenProduct={openProduct} />;

      return (
        <React.Fragment>
          <window.Header current={page === 'product' ? 'catalog' : page} onNav={nav} />
          <div className="app-main">{view}</div>
          <window.Footer />
        </React.Fragment>
      );
    }

    const waitForScreens = () => {
      if (window.LandingPage && window.CatalogPage && window.ProductPage && window.AboutPage && window.Header && window.Footer) {
        ReactDOM.createRoot(document.getElementById('app')).render(<App />);
      } else {
        setTimeout(waitForScreens, 40);
      }
    };
    waitForScreens();
  </script>
</body>
</html>
