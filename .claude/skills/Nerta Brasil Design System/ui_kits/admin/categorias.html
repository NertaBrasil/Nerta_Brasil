<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Categorias</title>
<link rel="stylesheet" href="../../styles.css">
<style>html,body{background:var(--navy-deep);}</style>
</head>
<body>
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
      <rect width="100" height="100" fill="#0D1B2E"/>
      <rect x="20" y="24" width="60" height="10" rx="3" fill="#163258"/>
      <rect x="20" y="42" width="60" height="10" rx="3" fill="#163258"/>
      <rect x="20" y="60" width="60" height="10" rx="3" fill="#163258"/>
      <rect x="20" y="24" width="6" height="46" fill="#1E7FC8"/>
    </svg>
  </template>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="assets-inline.js"></script>
  <script src="admin-data.js"></script>
  <script type="text/babel" src="responsive.js"></script>
  <script type="text/babel" src="AdminShell.jsx"></script>
  <script type="text/babel" src="widgets.jsx"></script>
  <script type="text/babel" src="CategoriasPage.jsx"></script>
  <script type="text/babel" data-presets="react">
    const wait = () => {
      if (window.AdminShell && window.ImageCropper && window.CategoriasPage) {
        ReactDOM.createRoot(document.getElementById('root')).render(
          React.createElement(window.AdminShell, { active: "categorias", title: "Categorias", userRole: "admin" },
            React.createElement(window.CategoriasPage))
        );
        if (window.lucide) window.lucide.createIcons();
      } else { setTimeout(wait, 40); }
    };
    wait();
  </script>
</body>
</html>
