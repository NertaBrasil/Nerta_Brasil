<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Usuários — Nerta Admin</title>
<link rel="stylesheet" href="../../_ds/nerta-brasil-design-system-82f464cb-ff2c-4145-8c46-d4e0ed907cfc/styles.css">
<style>html,body{background:var(--navy-deep);}*{box-sizing:border-box;}a{text-decoration:none;}</style>
</head>
<body>
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
      <rect width="100" height="100" fill="#0D1B2E"/>
      <circle cx="38" cy="38" r="14" fill="#163258"/>
      <circle cx="62" cy="38" r="14" fill="#112644"/>
      <rect x="12" y="62" width="76" height="12" rx="6" fill="#163258"/>
      <rect x="74" y="26" width="16" height="16" rx="8" fill="#C9951A" opacity="0.8"/>
    </svg>
  </template>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds/nerta-brasil-design-system-82f464cb-ff2c-4145-8c46-d4e0ed907cfc/_ds_bundle.js"></script>
  <script src="assets-inline.js"></script>
  <script src="admin-data.js"></script>
  <script type="text/babel" src="responsive.js"></script>
  <script type="text/babel" src="AdminShell.jsx"></script>
  <script type="text/babel" src="widgets.jsx"></script>
  <script type="text/babel" src="UsuariosPage.jsx"></script>
  <script type="text/babel" data-presets="react">
    (function wait() {
      if (window.AdminShell && window.UsuariosPage && window.Modal && window.RoleBadge) {
        // userRole: 'admin' | 'editor' — em produção virá do Supabase session.
        var userRole = 'admin';
        ReactDOM.createRoot(document.getElementById('root')).render(
          React.createElement(window.AdminShell,
            { active: 'usuarios', title: 'Usuários', userRole: userRole },
            React.createElement(window.UsuariosPage, { userRole: userRole }))
        );
        if (window.lucide) window.lucide.createIcons();
      } else { setTimeout(wait, 40); }
    })();
  </script>
</body>
</html>
