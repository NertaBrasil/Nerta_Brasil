<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Editar Produto — Nerta Admin</title>
<link rel="stylesheet" href="../../_ds/nerta-brasil-design-system-82f464cb-ff2c-4145-8c46-d4e0ed907cfc/styles.css">
<style>html,body{background:var(--navy-deep);}*{box-sizing:border-box;}a{text-decoration:none;}</style>
</head>
<body>
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
      <rect width="100" height="100" fill="#0D1B2E"/>
      <rect x="14" y="18" width="72" height="18" rx="3" fill="#163258"/>
      <rect x="14" y="44" width="72" height="14" rx="3" fill="#112644"/>
      <rect x="14" y="64" width="72" height="14" rx="3" fill="#112644"/>
      <rect x="14" y="18" width="4" height="60" fill="#1E7FC8"/>
    </svg>
  </template>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds/nerta-brasil-design-system-82f464cb-ff2c-4145-8c46-d4e0ed907cfc/_ds_bundle.js"></script>
  <script src="assets-inline.js"></script>
  <script src="admin-data.js"></script>
  <script type="text/babel" src="responsive.js"></script>
  <script type="text/babel" src="AdminShell.jsx"></script>
  <script type="text/babel" src="widgets.jsx"></script>
  <script type="text/babel" src="ProdutoFormPage.jsx"></script>
  <script type="text/babel" data-presets="react">
    (function wait() {
      if (window.AdminShell && window.ProdutoFormPage && window.Modal && window.Switch) {
        var editing = new URLSearchParams(window.location.search).has('id');
        ReactDOM.createRoot(document.getElementById('root')).render(
          React.createElement(window.AdminShell,
            { active: 'produtos', title: editing ? 'Editar Produto' : 'Novo Produto', userRole: 'admin' },
            React.createElement(window.ProdutoFormPage, { editing: editing }))
        );
        if (window.lucide) window.lucide.createIcons();
      } else { setTimeout(wait, 40); }
    })();
  </script>
</body>
</html>
