<!-- @dsCard group="Components" viewport="700x300" name="Switch, Danger & Modal" subtitle="Toggles, botão destrutivo e diálogo de confirmação" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 26px 28px; background: var(--navy-deep); }
  .grid { display: flex; flex-direction: column; gap: 22px; }
  .row { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .lab { font-family: var(--font-body); font-size: 10px; letter-spacing: .07em; text-transform: uppercase;
         color: var(--muted-text); width: 120px; flex: none; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Switch, Button, Modal } = window.NertaBrasilDesignSystem_82f464;
    function Demo() {
      const [a, setA] = React.useState(true);
      const [b, setB] = React.useState(false);
      const [open, setOpen] = React.useState(false);
      return (
        <div className="grid">
          <div className="row"><span className="lab">Switch</span>
            <Switch checked={a} onChange={setA} label="Ativo no catálogo" />
            <Switch checked={b} onChange={setB} label="Destaque" />
          </div>
          <div className="row"><span className="lab">Destrutivo</span>
            <Button variant="danger" size="sm">Excluir</Button>
            <Button variant="danger-ghost" size="sm">Remover</Button>
          </div>
          <div className="row"><span className="lab">Modal</span>
            <Button variant="secondary" size="sm" onClick={() => setOpen(true)}>Abrir confirmação</Button>
          </div>
          <Modal open={open} title="Excluir produto?" destructive confirmLabel="Excluir"
                 onClose={() => setOpen(false)} onConfirm={() => setOpen(false)}>
            Esta ação não pode ser desfeita. O produto sai do catálogo imediatamente.
          </Modal>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
