<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px; background: var(--navy-deep); }
  .row { display: flex; align-items: center; gap: 40px; flex-wrap: wrap; }
  .cell { display: flex; flex-direction: column; gap: 10px; }
  .cap { font-family: var(--font-body); font-size: 10px; letter-spacing: .08em;
         text-transform: uppercase; color: var(--muted-text); }
  .swatch-pill { background: var(--nerta-blue); padding: 14px 22px; border-radius: 999px;
                 display: inline-flex; align-items:center; }
  img { display: block; }
</style>
</head>
<body>
  <div class="row">
    <div class="cell">
      <span class="cap">Primária · sobre navy</span>
      <img src="../assets/nerta-logo-dark.svg" alt="nerta" height="56">
    </div>
    <div class="cell">
      <span class="cap">Pill · lockup completo</span>
      <img src="../assets/nerta-logo.svg" alt="nerta" height="56">
    </div>
    <div class="cell">
      <span class="cap">Distribuidor oficial</span>
      <img src="../assets/provisao-logo.svg" alt="provisão" height="50">
    </div>
  </div>
</body>
</html>
