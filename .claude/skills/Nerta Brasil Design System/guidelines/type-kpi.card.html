<!-- @dsCard group="Type" viewport="700x180" name="Números de Impacto (KPI)" subtitle="Bold 36–56px · teal ou azul · métricas e provas" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 28px; background: var(--navy-deep); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }
  .kpi { display: flex; flex-direction: column; gap: 4px; }
  .num { font-family: var(--font-display); font-weight: 700; font-size: 52px; line-height: 1; letter-spacing: -.02em; }
  .cap { font-family: var(--font-body); font-size: 11px; color: var(--muted-text); letter-spacing: .02em; }
</style>
</head>
<body>
  <div class="grid">
    <div class="kpi"><span class="num" style="color:#1DB87E">50+</span><span class="cap">anos de tecnologia</span></div>
    <div class="kpi"><span class="num" style="color:#1E7FC8">60+</span><span class="cap">países atendidos</span></div>
    <div class="kpi"><span class="num" style="color:#1DB87E">3–5%</span><span class="cap">diluição de uso</span></div>
    <div class="kpi"><span class="num" style="color:#1E7FC8">25L</span><span class="cap">bombona padrão</span></div>
  </div>
</body>
</html>
