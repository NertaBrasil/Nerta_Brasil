<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 28px; background: var(--navy-deep); }
  .stack { display: flex; flex-direction: column; gap: 20px; }
  .tag { font-family: var(--font-body); font-size: 10px; letter-spacing: .06em;
         text-transform: uppercase; color: var(--muted-text); margin-bottom: 7px; }
  .label { font-family: var(--font-body); font-weight: 500; font-size: 10px; letter-spacing: .08em;

  .partner { font-family: var(--font-display); font-weight: 700; font-size: 16px; color: var(--provisao-gold); }
  .body { font-family: var(--font-body); font-weight: 400; font-size: 14px; line-height: 1.6;
          color: var(--muted-text); max-width: 560px; }
</style>
</head>
<body>
  <div class="stack">
    <div><div class="tag">Label de seção · 10 / 500</div><div class="label">Linha de produtos · Tecnologia alcalina</div></div>
    <div><div class="tag">Parceiro / CTA · 16 / 700</div><div class="partner">Distribuidor Oficial Provisão</div></div>
    <div><div class="tag">Body · 14 / 400 · line-height 1.6</div><p class="body" style="margin:0">Formulação alcalina superconcentrada que dissolve sujeiras severas sem necessidade de esfregação. O menor custo real por lavagem do mercado.</p></div>
  </div>
</body>
