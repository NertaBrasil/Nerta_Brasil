<!-- @dsCard group="Type" viewport="700x300" name="Headlines & Display" subtitle="Plus Jakarta Sans Bold · tracking -0.02em · branco" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 28px; background: var(--navy-deep); }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: baseline; gap: 18px; }
  .tag { font-family: var(--font-body); font-size: 10px; letter-spacing: .06em;
         text-transform: uppercase; color: var(--muted-text); width: 132px; flex: none; }
  .d1 { font-family: var(--font-display); font-weight: 800; font-size: 40px; letter-spacing: -.02em; color: var(--white); line-height: 1.05; }
  .d2 { font-family: var(--font-display); font-weight: 700; font-size: 28px; letter-spacing: -.02em; color: var(--white); }
  .d3 { font-family: var(--font-display); font-weight: 700; font-size: 22px; letter-spacing: -.01em; color: var(--white); }
  .hl { font-family: var(--font-display); font-weight: 700; font-size: 22px; color: var(--sky-blue); }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><span class="tag">Display · 40 / 800</span><span class="d1">Química europeia</span></div>
    <div class="row"><span class="tag">Headline · 28 / 700</span><span class="d2">Active Diamond Foam</span></div>
    <div class="row"><span class="tag">Subhead · 22 / 700</span><span class="d3">Detergente espuma ativa</span></div>
    <div class="row"><span class="tag">Destaque · Sky Blue</span><span class="hl">Diluição 3–5%</span></div>
  </div>
</body>
</html>
