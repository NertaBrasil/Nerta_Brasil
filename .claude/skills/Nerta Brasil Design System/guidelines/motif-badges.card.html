<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 28px; background: var(--navy-deep); font-family: var(--font-body); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .pill { display: inline-flex; align-items: center; height: 26px; padding: 0 13px; border-radius: 999px;
          font-size: 10.5px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }
  .blue { border: 1px solid rgba(30,127,200,.5); color: var(--sky-blue); background: rgba(30,127,200,.1); }
  .gold { border: 1px solid rgba(201,149,26,.55); color: var(--gold-light); background: rgba(201,149,26,.1); }
  .solid { background: var(--nerta-blue); color: #fff; border: none; }
  .teal { border: 1px solid rgba(29,184,126,.5); color: var(--teal); background: rgba(29,184,126,.1); }
</style>
</head>
<body>
  <div class="row">
    <span class="pill blue">Detergente Espuma Ativa</span>
    <span class="pill gold">Oportunidade 2026</span>
    <span class="pill teal">Ação Touchless</span>
    <span class="pill solid">Diluição 3–5%</span>
    <span class="pill blue">Linha Agro</span>
  </div>
</body>
</html>
