<!-- @dsCard group="Colors" viewport="700x150" name="Gradiente Hero" subtitle="Navy diagonal #0D1B2E → #163258 (hero / landing)" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--navy-deep); font-family: var(--font-body); }
  .hero { height: 104px; border-radius: var(--radius-lg); border: 1px solid var(--navy-border);
          background: var(--bg-gradient); display: flex; align-items: flex-end; padding: 16px 18px;
          justify-content: space-between; }
  .label { color: var(--muted-text); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; }
  .stops { color: var(--light-gray); font-size: 11px; letter-spacing: .04em; }
</style>
</head>
<body>
  <div class="hero">
    <span class="label">Hero escuro · gradiente diagonal 135°</span>
    <span class="stops">#0D1B2E → #163258</span>
  </div>
</body>
</html>
