<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 28px; background: var(--navy-deep); font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 26px; }
  .item { display: flex; flex-direction: column; gap: 8px; }
  .num { font-family: var(--font-display); font-weight: 700; font-size: 52px; line-height: 1;
         color: var(--sky-blue); letter-spacing: -.02em; }
  h4 { font-family: var(--font-display); font-size: 15px; color: var(--white); margin: 0; font-weight: 700; }
  p { margin: 0; font-size: 12px; color: var(--muted-text); line-height: 1.5; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><span class="num">01</span><h4>Contexto de mercado</h4><p>Credibilidade antes de catálogo.</p></div>
    <div class="item"><span class="num">02</span><h4>Tecnologia belga</h4><p>Fórmulas nano-moleculares certificadas.</p></div>
    <div class="item"><span class="num">03</span><h4>Custo por lavagem</h4><p>Diluição superconcentrada de 3–5%.</p></div>
  </div>
</body>
</html>
