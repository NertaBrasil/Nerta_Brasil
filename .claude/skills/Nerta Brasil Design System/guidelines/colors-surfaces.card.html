<!-- @dsCard group="Colors" viewport="700x180" name="Superfícies Navy" subtitle="Cards e painéis — o sistema vive no escuro" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--navy-deep); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { border-radius: var(--radius-md); border: 1px solid var(--navy-border); overflow: hidden; }
  .chip { height: 78px; }
  .meta { padding: 10px 12px; background: var(--navy-mid); }
  .name { color: var(--white); font-weight: 700; font-size: 13px; }
  .hex { color: var(--muted-text); font-size: 11px; letter-spacing: .04em; margin-top: 2px; }
  .role { color: var(--muted-text); font-size: 10px; margin-top: 6px; line-height: 1.4; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#112644"></div><div class="meta"><div class="name">Navy Mid</div><div class="hex">#112644</div><div class="role">Cards · painéis</div></div></div>
    <div class="sw"><div class="chip" style="background:#163258"></div><div class="meta"><div class="name">Navy Light</div><div class="hex">#163258</div><div class="role">Hover states</div></div></div>
    <div class="sw"><div class="chip" style="background:#1E3A5A"></div><div class="meta"><div class="name">Navy Border</div><div class="hex">#1E3A5A</div><div class="role">Bordas sutis</div></div></div>
    <div class="sw"><div class="chip" style="background:#081320"></div><div class="meta"><div class="name">Navy Deeper</div><div class="hex">#081320</div><div class="role">Profundidade</div></div></div>
  </div>
</body>
</html>
