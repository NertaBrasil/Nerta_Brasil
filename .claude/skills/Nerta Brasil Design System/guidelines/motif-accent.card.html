<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--navy-deep); font-family: var(--font-body); }
  .stack { display: flex; flex-direction: column; gap: 14px; max-width: 600px; }
  .block { background: var(--navy-mid); border: 1px solid var(--navy-border); border-radius: var(--radius-md);
           padding: 14px 18px; }
  .blue { border-left: 4px solid var(--nerta-blue); }
  .gold { border-left: 4px solid var(--provisao-gold); }
  .teal { border-left: 4px solid var(--teal); }
  h4 { font-family: var(--font-display); font-size: 15px; color: var(--white); margin: 0 0 4px; font-weight: 700; }
  p { margin: 0; font-size: 12.5px; color: var(--muted-text); line-height: 1.55; }
</style>
</head>
<body>
  <div class="stack">
    <div class="block blue"><h4>Alta Performance Agrícola</h4><p>Remove incrustações de tratores e colheitadeiras com agilidade.</p></div>
    <div class="block teal"><h4>Tecnologia Touchless Real</h4><p>Preserva o brilho de pinturas modernas, eliminando riscos mecânicos.</p></div>
    <div class="block gold"><h4>Distribuição Exclusiva Provisão</h4><p>Importação oficial e suporte técnico em todo o território nacional.</p></div>
  </div>
</body>
</html>
